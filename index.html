<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ibow_import</title>
  </head>

  <body>
    <main class="container">
      <h1>ibow_import</h1>

      <button id="btnImport">Excelファイルを取り込む</button>
      <pre id="result"></pre>

      <section>
        <h2>未分類項目</h2>
        <div id="unmappedList"></div>
      </section>

      <section>
        <h2>分類登録</h2>

        <input id="ibowItemName" placeholder="iBow項目名" readonly />

        <select id="categoryName"></select>

        <input id="groupName" placeholder="グループ名 例：基本療養費" />

        <input id="itemType" placeholder="種別 例：basic_fee" />

        <input id="displayOrder" type="number" placeholder="表示順" />

        <button id="btnSaveMapping">分類を保存</button>
      </section>

      <section>
        <h2>登録済み分類</h2>
        <div id="masterList"></div>
      </section>

      <section>
        <h2>カテゴリマスタ登録</h2>

        <input id="newCategoryName" placeholder="カテゴリ名" />
        <input id="newCategoryGroupName" placeholder="グループ名" />
        <input id="newCategoryItemType" placeholder="種別" />
        <input id="newCategoryDisplayOrder" type="number" placeholder="表示順" />

        <button id="btnSaveCategory">カテゴリを保存</button>
      </section>

      <script type="module" src="./src/main.js"></script>      
    </main>
  </body>
</html>
